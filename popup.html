<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px;
      height: 620px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(160deg, #1a0a2e 0%, #2d1b4e 50%, #1a2a1a 100%);
      color: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ===== 顶部 header ===== */
    .header {
      padding: 12px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #f5a623 0%, #e8722a 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 12px rgba(245,166,35,0.4);
      flex-shrink: 0;
    }
    .header-text h1 { font-size: 15px; font-weight: 700; }
    .header-text p { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 1px; }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .current-time { font-size: 11px; color: rgba(255,255,255,0.5); }
    .notify-toggle {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; color: rgba(255,255,255,0.6); cursor: pointer;
    }
    .toggle-switch {
      width: 28px; height: 15px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px; position: relative;
      transition: background 0.2s; cursor: pointer;
    }
    .toggle-switch.on { background: #f5a623; }
    .toggle-knob {
      width: 11px; height: 11px;
      background: white; border-radius: 50%;
      position: absolute; top: 2px; left: 2px;
      transition: left 0.2s;
    }
    .toggle-switch.on .toggle-knob { left: 15px; }

    /* ===== 当前时辰卡片（紧凑版）===== */
    .current-card {
      margin: 10px 14px 8px;
      border-radius: 14px;
      padding: 1.5px;
      background: linear-gradient(135deg, #f5a623, #e8722a, #c0392b);
      flex-shrink: 0;
    }
    .current-card-inner {
      background: linear-gradient(135deg, rgba(42,10,60,0.95), rgba(26,42,26,0.95));
      border-radius: 13px;
      padding: 12px 14px;
    }
    .current-top {
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
    }
    .current-ganzhi {
      font-size: 40px; font-weight: 900; color: #f5a623; line-height: 1;
      text-shadow: 0 0 20px rgba(245,166,35,0.5); flex-shrink: 0;
    }
    .current-meta { flex: 1; }
    .current-meta h2 { font-size: 15px; font-weight: 700; }
    .current-meta .organ { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 2px; }
    .current-meta .time-range { font-size: 11px; color: #f5a623; margin-top: 2px; }
    .current-label {
      font-size: 10px; color: #f5a623; letter-spacing: 1.5px;
      background: rgba(245,166,35,0.12); padding: 2px 8px;
      border-radius: 10px; flex-shrink: 0;
    }

    /* 宜忌双列 */
    .yi-ji-row { display: flex; gap: 8px; }
    .yi-block {
      flex: 1; background: rgba(255,255,255,0.04);
      border-radius: 8px; padding: 7px 9px;
    }
    .yi-ji-title { font-size: 11px; font-weight: 700; margin-bottom: 5px; }
    .yi-title { color: #00e676; }
    .ji-title { color: #ff5252; }
    .yi-ji-item { font-size: 11px; padding: 1px 0; line-height: 1.5; }
    .yi-item { color: rgba(0,230,118,0.85); }
    .ji-item { color: rgba(255,82,82,0.85); }

    /* ===== 标签切换 ===== */
    .tabs {
      display: flex; margin: 0 14px 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 10px; padding: 3px; flex-shrink: 0;
    }
    .tab {
      flex: 1; padding: 6px; text-align: center;
      font-size: 12px; cursor: pointer; border-radius: 8px;
      transition: all 0.2s; color: rgba(255,255,255,0.5);
    }
    .tab.active {
      background: linear-gradient(135deg, #f5a623, #e8722a);
      color: #fff; font-weight: 600;
    }

    /* ===== 内容区（弹性填充）===== */
    .content-area {
      flex: 1; min-height: 0; overflow: hidden;
      position: relative;
    }
    .table-container {
      position: absolute; inset: 0;
      overflow-y: auto;
      padding: 0 14px 14px;
    }
    .table-container::-webkit-scrollbar { width: 4px; }
    .table-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

    .hour-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 11px; border-radius: 10px; margin-bottom: 5px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer; transition: all 0.2s;
    }
    .hour-item:hover { background: rgba(255,255,255,0.08); }
    .hour-item.active-hour {
      background: rgba(245,166,35,0.12);
      border-color: rgba(245,166,35,0.4);
    }
    .hour-gz {
      font-size: 20px; font-weight: 900; color: #f5a623;
      width: 26px; text-align: center; flex-shrink: 0;
    }
    .hour-item.active-hour .hour-gz { text-shadow: 0 0 12px rgba(245,166,35,0.6); }
    .hour-body { flex: 1; min-width: 0; }
    .hour-name-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
    .hour-name { font-size: 13px; font-weight: 600; }
    .hour-time { font-size: 10px; color: rgba(255,255,255,0.45); }
    .hour-organ { font-size: 10px; color: rgba(255,255,255,0.55); }
    .hour-tip { font-size: 10px; color: rgba(255,255,255,0.7); margin-top: 2px; line-height: 1.5; }
    .now-badge {
      font-size: 9px; background: #f5a623; color: #1a0a2e;
      padding: 1px 5px; border-radius: 8px; font-weight: 700; flex-shrink: 0;
    }

    /* ===== 详情面板 ===== */
    #detailPanel {
      display: none;
      position: absolute; inset: 0;
      overflow-y: auto;
      padding: 0 14px 14px;
    }
    #detailPanel::-webkit-scrollbar { width: 4px; }
    #detailPanel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    .detail-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px; padding: 10px 12px;
      background: rgba(245,166,35,0.1); border-radius: 10px;
    }
    .detail-gz { font-size: 30px; font-weight: 900; color: #f5a623; }
    .detail-section {
      background: rgba(255,255,255,0.05);
      border-radius: 10px; padding: 12px; margin-bottom: 8px;
    }
    .detail-section h3 {
      font-size: 12px; color: #f5a623; margin-bottom: 8px;
      display: flex; align-items: center; gap: 5px;
    }
    .detail-section ul { list-style: none; }
    .detail-section ul li {
      font-size: 12px; color: rgba(255,255,255,0.8);
      padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
      line-height: 1.6; display: flex; gap: 6px;
    }
    .detail-section ul li:last-child { border-bottom: none; }
    .detail-section ul li::before { content: '•'; color: #f5a623; flex-shrink: 0; }
    .back-btn {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: rgba(255,255,255,0.5);
      cursor: pointer; margin-bottom: 8px; padding: 4px 0;
    }
    .back-btn:hover { color: #f5a623; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-icon">☯</div>
      <div class="header-text">
        <h1>十二时辰养生助手</h1>
        <p>顺应天时，调养身心</p>
      </div>
    </div>
    <div class="header-right">
      <div class="current-time" id="currentTime"></div>
      <div class="notify-toggle">
        <span>时辰通知</span>
        <div class="toggle-switch" id="notifyToggle">
          <div class="toggle-knob"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="current-card">
    <div class="current-card-inner">
      <div class="current-top">
        <div class="current-ganzhi" id="curGanzhi"></div>
        <div class="current-meta">
          <h2 id="curName"></h2>
          <div class="organ" id="curOrgan"></div>
          <div class="time-range" id="curTimeRange"></div>
        </div>
        <div class="current-label">当前时辰</div>
      </div>
      <div class="yi-ji-row" id="curYiJi"></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabTable">📋 对照表</div>
    <div class="tab" id="tabDetail">📖 详细建议</div>
  </div>

  <div class="content-area">
    <div class="table-container" id="tableView"></div>
    <div id="detailPanel"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
