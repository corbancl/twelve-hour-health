<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px;
      height: 600px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(160deg, #1a0a2e 0%, #2d1b4e 50%, #1a2a1a 100%);
      color: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px;
    }
    .header-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #f5a623 0%, #e8722a 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 16px rgba(245,166,35,0.4);
      flex-shrink: 0;
    }
    .header-text h1 { font-size: 17px; font-weight: 700; }
    .header-text p { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
    .current-time {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      text-align: right;
    }

    /* 当前时辰卡片 */
    .current-card {
      margin: 14px 16px 10px;
      border-radius: 16px;
      padding: 16px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .current-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      padding: 1.5px;
      background: linear-gradient(135deg, #f5a623, #e8722a, #c0392b);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }
    .current-card-inner {
      background: rgba(245,166,35,0.08);
      border-radius: 14px;
      padding: 14px;
    }
    .current-label {
      font-size: 11px;
      color: #f5a623;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .current-main {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }
    .current-ganzhi {
      font-size: 36px;
      font-weight: 900;
      color: #f5a623;
      line-height: 1;
      text-shadow: 0 0 20px rgba(245,166,35,0.5);
    }
    .current-info h2 { font-size: 16px; font-weight: 700; }
    .current-info .organ {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-top: 3px;
    }
    .current-info .time-range {
      font-size: 11px;
      color: #f5a623;
      margin-top: 2px;
    }
    .current-tips {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      line-height: 1.7;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 10px;
    }
    .yi-ji-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .yi-block {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 8px;
    }
    .yi-ji-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .yi-title { color: #00e676; }
    .ji-title { color: #ff5252; }
    .yi-ji-item {
      font-size: 11px;
      padding: 2px 0;
      line-height: 1.5;
    }
    .yi-item { color: rgba(0,230,118,0.85); }
    .ji-item { color: rgba(255,82,82,0.85); }
    .tips-row { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 8px; }
    .current-tips .tip-item {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
    }
    .tip-dot { color: #f5a623; flex-shrink: 0; }

    /* 标签切换 */
    .tabs {
      display: flex;
      margin: 0 16px 10px;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 3px;
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      padding: 7px;
      text-align: center;
      font-size: 12px;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      color: rgba(255,255,255,0.5);
    }
    .tab.active {
      background: linear-gradient(135deg, #f5a623, #e8722a);
      color: #fff;
      font-weight: 600;
    }

    /* 对照表 */
    .table-container {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
      min-height: 0;
    }
    .table-container::-webkit-scrollbar { width: 4px; }
    .table-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

    .hour-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      transition: all 0.2s;
    }
    .hour-item:hover { background: rgba(255,255,255,0.08); }
    .hour-item.active-hour {
      background: rgba(245,166,35,0.12);
      border-color: rgba(245,166,35,0.4);
    }
    .hour-gz {
      font-size: 20px;
      font-weight: 900;
      color: #f5a623;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }
    .hour-item.active-hour .hour-gz { text-shadow: 0 0 12px rgba(245,166,35,0.6); }
    .hour-body { flex: 1; min-width: 0; }
    .hour-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }
    .hour-name { font-size: 14px; font-weight: 600; }
    .hour-time { font-size: 11px; color: rgba(255,255,255,0.45); }
    .hour-organ { font-size: 11px; color: rgba(255,255,255,0.55); }
    .hour-tip { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 3px; line-height: 1.5; }
    .now-badge {
      font-size: 10px;
      background: #f5a623;
      color: #1a0a2e;
      padding: 1px 6px;
      border-radius: 8px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* 建议详情面板 */
    #detailPanel {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
      min-height: 0;
    }
    #detailPanel::-webkit-scrollbar { width: 4px; }
    #detailPanel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    .detail-section {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .detail-section h3 {
      font-size: 13px;
      color: #f5a623;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .detail-section ul {
      list-style: none;
      padding: 0;
    }
    .detail-section ul li {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      line-height: 1.6;
      display: flex;
      gap: 6px;
    }
    .detail-section ul li:last-child { border-bottom: none; }
    .detail-section ul li::before { content: '•'; color: #f5a623; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <div class="header-icon">☯</div>
      <div class="header-text">
        <h1>十二时辰养生助手</h1>
        <p>顺应天时，调养身心</p>
      </div>
    </div>
    <div class="current-time" id="currentTime"></div>
  </div>

  <div class="current-card">
    <div class="current-card-inner">
      <div class="current-label">▶ 当前时辰</div>
      <div class="current-main">
        <div class="current-ganzhi" id="curGanzhi"></div>
        <div class="current-info">
          <h2 id="curName"></h2>
          <div class="organ" id="curOrgan"></div>
          <div class="time-range" id="curTimeRange"></div>
        </div>
      </div>
      <div class="current-tips" id="curTips"></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabTable">📋 对照表</div>
    <div class="tab" id="tabDetail">📖 详细建议</div>
  </div>

  <div class="table-container" id="tableView"></div>
  <div id="detailPanel"></div>

  <script src="popup.js"></script>
</body>
</html>
